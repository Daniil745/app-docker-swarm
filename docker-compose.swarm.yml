version: '3.8'

networks:
  rest-network:
    driver: overlay
    attachable: true

volumes:
  postgres_data:
  redis_data:
  grafana_data:

configs:
  nginx_config:
    file: ./nginx/nginx.conf
  prometheus_config:
    file: ./prometheus/prometheus.yml
  grafana_config:
    file: ./grafana/datasource.yml
  init_sql:
    file: ./internal/sql/init.sql

services:
  postgres:
    image: postgres:15-alpine
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    environment:
      POSTGRES_DB: filmsdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    configs:
      - source: init_sql
        target: /docker-entrypoint-initdb.d/init.sql
    networks:
      - rest-network

  redis:
    image: redis:7-alpine
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - rest-network

  web:
    image: daniil9090/film-api:latest
    deploy:
      mode: replicated
      replicas: 2
      placement:
        constraints:
          - node.role == manager
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://postgres:admin@postgres:5432/filmsdb?sslmode=disable
      - REDIS_URL=film-api_redis:6379
    networks:
      - rest-network

  nginx:
    image: nginx:alpine
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    ports:
      - "80:80"
    configs:
      - source: nginx_config
        target: /etc/nginx/nginx.conf
    networks:
      - rest-network

  prometheus:
    image: prom/prometheus:v2.55.0
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    ports:
      - "9090:9090"
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    networks:
      - rest-network

  grafana:
    image: grafana/grafana:11.3.0
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    configs:
      - source: grafana_config
        target: /etc/grafana/provisioning/datasources/datasource.yml
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - rest-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    deploy:
      mode: global
    ports:
      - "8083:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - rest-network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:admin@postgres:5432/filmsdb?sslmode=disable"
    ports:
      - "9187:9187"
    networks:
      - rest-network

  redis-exporter:
    image: oliver006/redis_exporter:latest
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    environment:
      REDIS_ADDR: "redis:6379"
    ports:
      - "9121:9121"
    networks:
      - rest-network

  node-exporter:
    image: prom/node-exporter:latest
    deploy:
      mode: global
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    networks:
      - rest-network