global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['film-api_prometheus:9090']
  - job_name: 'web'
    static_configs:
      - targets: ['film-api_web:8080']
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['film-api_postgres-exporter:9187']
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['film-api_redis-exporter:9121']
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['film-api_cadvisor:8080']
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['film-api_node-exporter:9100']